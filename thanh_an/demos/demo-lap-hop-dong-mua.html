  .product-table td{ vertical-align:middle; border:1px solid #e3e8ee; padding:4px 6px; }
  .product-table td.num, .product-table th.num{ text-align:right; }
  .product-table .warning-row td{ background:#fcefec; }
  .product-table input.form-control-sm{ font-size:11.5px; height:28px; }
  .product-table .cell-name{ min-width:220px; white-space:normal; }

  .drag-handle{ cursor:grab; text-align:center; color:#7a8894; }
  .total-block .row{ margin-bottom:2px; }
  .btn-xs{ padding:2px 7px; font-size:11px; }
  .filter-wrap{ background:#f7faf9; border:1px solid #e3e8ee; border-radius:6px; padding:10px 12px; margin-top:6px; }
  .product-table td.cell-purpose{ min-width:220px; white-space:normal; line-height:1.5; }

  .cell-purpose .pp-sep{ color:#c0c8d0; font-weight:600; padding:0 2px; }
  .btn-unlink-purpose{ border:0; background:transparent; color:#c0392b; padding:0 2px; cursor:pointer; font-size:13px; line-height:1; }
  .btn-unlink-purpose:hover{ color:#e74c3c; }
  /* ===== Modal chọn hàng hóa ===== */
  .gm-overlay{ position:fixed; inset:0; background:rgba(0,0,0,.4); z-index:1050; display:flex; align-items:flex-start; justify-content:center; padding:40px 16px; overflow:auto; }
  .gm-dialog{ background:#fff; border-radius:8px; width:100%; max-width:1040px; box-shadow:0 10px 40px rgba(0,0,0,.3); }
  .gm-head{ padding:12px 16px; border-bottom:1px solid #e3e8ee; display:flex; justify-content:space-between; align-items:center; }
  .gm-head h4{ margin:0; font-size:15px; font-weight:600; color:#2c3e50; }
  .gm-body{ padding:12px 16px; max-height:60vh; overflow:auto; }
  .gm-foot{ padding:12px 16px; border-top:1px solid #e3e8ee; display:flex; justify-content:space-between; align-items:center; }
  .gm-table{ font-size:12px; margin-bottom:0; }
  .gm-table thead th{ position:sticky; top:0; background:#eef4f3; color:#2c3e50; font-size:11.5px; font-weight:600; text-align:center; vertical-align:middle; border:1px solid #d9e2e0; }
  .gm-table td{ vertical-align:middle; border:1px solid #e3e8ee; padding:4px 6px; }
  .gm-table td.num, .gm-table th.num{ text-align:right; }
  .gm-table tbody tr{ cursor:pointer; }
  .gm-table tbody tr.gm-sel td{ background:#eaf4ff; }
  .gm-pill{ display:inline-block; padding:1px 8px; border-radius:10px; font-size:10.5px; font-weight:600; white-space:nowrap; }
  .gm-pill-rep{ background:#e3f1ff; color:#0d6efd; }

    <h5>ĐIỀU 1. ĐỐI TƯỢNG HỢP ĐỒNG</h5>
    <p>Bên Bán đồng ý bán và Bên Mua đồng ý mua hàng hóa là hóa chất, vật tư xét nghiệm (chi tiết theo danh mục hàng hóa đính kèm Hợp đồng). Số lượng hàng hóa cung cấp theo đơn đặt hàng dự trù của Bên Mua và khả năng cung ứng của Bên Bán.</p>

    <p>Danh sách hàng hóa và giá cả được quy định chi tiết tại danh mục đính kèm Hợp đồng. Đơn giá có thể thay đổi theo thị trường, Bên Bán thông báo đơn giá mới trước tối thiểu 10 ngày. Hàng hóa còn mới 100%, nguyên đai nguyên kiện, được phép lưu hành tại Việt Nam.</p>

    <h5>ĐIỀU 4. THANH TOÁN</h5>

    <h5>ĐIỀU 5. QUYỀN VÀ NGHĨA VỤ CỦA CÁC BÊN</h5>

    <h5>ĐIỀU 7. BẤT KHẢ KHÁNG - GIẢI QUYẾT TRANH CHẤP</h5>

// Pool tổng "Báo cáo nhu cầu mua" — gồm cả hàng đã chọn sẵn trong HĐ (products) + hàng chưa đưa vào HĐ (availableProducts).
// Popup luôn lọc bỏ mã đã có trong HĐ → xóa hàng khỏi HĐ thì hàng đó hiện lại để chọn.
SEED.reportPool = (function(){
  const pool = [];
  SEED.products.filter(p=>p.source==='report').forEach(p=>{
    const e = Object.assign({}, p);
    e.purposes = (p.purposes||[]).map(x=>Object.assign({}, x));
    pool.push(e);
  });
  SEED.availableProducts.forEach(p=>pool.push(Object.assign({}, p)));
  return pool;
})();

   tm:true → chỉ hiện khi loại HĐ = Thương mại */
const COLUMNS = [
  { key:'product_code',     label:'Mã hàng',              prop:'code',     type:'text',    visible:true },
  { key:'specification',    label:'Quy cách',             prop:'spec',     type:'text',    visible:true },

  { key:'proposed_qty',     label:'SL đề xuất mua',       prop:'proposedQty', type:'ronum', visible:true, num:true, tm:true },
  { key:'order_qty',        label:'SL đặt mua',           prop:'orderQty', type:'inpnum',  visible:true, num:true, tm:true },
  { key:'price',            label:'Đơn giá có VAT (VNĐ)', prop:'price',    type:'money',   visible:true, num:true },

];
function visibleCols(){ return COLUMNS.filter(c=>c.visible && (!c.tm || STATE.contractType==='thuong_mai')); }
function amountOf(p){ return (Number(p.price)||0)*(Number(p.orderQty)||0); }
function esc(s){ return String(s==null?'':s).replace(/"/g,'&quot;'); }
function docSo(n){
  const chu=['không','một','hai','ba','bốn','năm','sáu','bảy','tám','chín'];
  function doc3(num, full){
    const t=Math.floor(num/100), ch=Math.floor((num%100)/10), dv=num%10; let s='';
    if(t>0) s+=chu[t]+' trăm'; else if(full) s+='không trăm';
    if(ch>1){ s+=' '+chu[ch]+' mươi'; if(dv===1) s+=' mốt'; else if(dv===5) s+=' lăm'; else if(dv>0) s+=' '+chu[dv]; }
    else if(ch===1){ s+=' mười'; if(dv===5) s+=' lăm'; else if(dv>0) s+=' '+chu[dv]; }
    else if(dv>0){ if(t>0||full) s+=' lẻ'; s+=' '+chu[dv]; }
    return s.trim();
  }
  n=Math.round(Number(n)||0); if(n<=0) return 'Không đồng';
  const units=['',' nghìn',' triệu',' tỷ']; let g=[], m=n;
  while(m>0){ g.push(m%1000); m=Math.floor(m/1000); }
  let top=g.length-1; while(top>0 && g[top]===0) top--;
  let out='';
  for(let i=g.length-1;i>=0;i--){ if(g[i]===0) continue; out+=doc3(g[i], i!==top)+units[i]+' '; }
  out=out.trim().replace(/\s+/g,' ');
  return out.charAt(0).toUpperCase()+out.slice(1)+' đồng./.';
}

function cellFor(col, idx, p){
  const gi = `data-idx="${idx}"`;
  switch(col.type){
    case 'text':   return `<td>${p[col.prop]||''}</td>`;
    case 'inpnum': return `<td class="num"><input type="number" class="form-control form-control-sm text-right inp-field" ${gi} data-field="${col.prop}" value="${p[col.prop]||0}"></td>`;
    case 'money':  return `<td class="num"><input type="number" class="form-control form-control-sm text-right inp-field" ${gi} data-field="price" value="${p.price||0}"></td>`;
    case 'inptext':return `<td><input class="form-control form-control-sm inp-field" ${gi} data-field="${col.prop}" value="${esc(p[col.prop])}"></td>`;
    case 'ronum':  { const v=p[col.prop]; return `<td class="num">${(v===null||v===undefined||v==='')?'—':fmtN(v)}</td>`; }
    case 'amount': return `<td class="num cell-amount">${fmtN(amountOf(p))}</td>`;
    case 'purpose':{
      const list = Array.isArray(p.purposes) ? p.purposes.filter(x=>x && x.proposal && String(x.proposal).trim() && x.proposal!=='—') : [];
      if(!list.length) return `<td class="cell-purpose"><span class="text-muted">Mua ngoài phiếu đề xuất</span></td>`;
      const lines = list.map(x=>{
        const parts = [x.proposal, x.customer||'—'];
        if(x.saleContract && x.saleContract!=='—') parts.push(x.saleContract);
        return `<div>${parts.join('<span class="pp-sep"> / </span>')}</div>`;
      }).join('');
      return `<td class="cell-purpose">${lines}
        <button type="button" class="btn-unlink-purpose" data-idx="${idx}" title="Bỏ gắn tất cả phiếu đề xuất (mua ngoài phiếu)"><i class="mdi mdi-link-variant-off"></i></button></td>`;
    }
  }
  return '<td></td>';
}
function matchFilter(p){
  const f = STATE.pFilter; if(!f) return true;
  const norm = s => String(s||'').toLowerCase();
  if(f.name && !norm(p.name).includes(f.name.toLowerCase())) return false;
  if(f.code && !norm(p.code).includes(f.code.toLowerCase())) return false;
  if(f.noProposal){ const has=Array.isArray(p.purposes) && p.purposes.some(x=>x && x.proposal && x.proposal!=='—'); if(has) return false; }
  return true;
}
function productRow(pi, p, stt){
  const cols = visibleCols();

}

/* ===== THÊM HÀNG VÀO HĐ — quy về mã hàng (không tách): mã đã có → cộng dồn SL + ghép phiếu; mã mới → tạo dòng ===== */
function sumQty(a,b){ const an=(a===null||a===undefined||a===''), bn=(b===null||b===undefined||b===''); if(an&&bn) return null; return (Number(a)||0)+(Number(b)||0); }
function poolToLine(pi){
  const line = Object.assign({}, pi);
  if(Array.isArray(pi.purposes)){
    line.purposes = pi.purposes.map(x=>Object.assign({}, x));
  } else {
    line.purposes = (pi.proposal && pi.proposal!=='—')
      ? [{proposal:pi.proposal, customer:pi.customer, saleContract:pi.saleContract}] : [];
  }
  delete line.proposal; delete line.customer; delete line.saleContract;
  return line;
}
function addPoolItem(pi){
  const line = poolToLine(pi);
  const ex = SEED.products.find(x=>x.code===line.code);
  if(!ex){ SEED.products.push(line); return; }
  ex.proposedQty = sumQty(ex.proposedQty, line.proposedQty);
  ex.orderQty = (Number(ex.orderQty)||0)+(Number(line.orderQty)||0);
  if(!Array.isArray(ex.purposes)) ex.purposes = [];
  (line.purposes||[]).forEach(np=>{ if(!ex.purposes.some(q=>q.proposal===np.proposal && q.customer===np.customer)) ex.purposes.push(np); });
}
/* ===== MODAL CHỌN HÀNG HÓA — 2 nguồn: Trong Báo cáo nhu cầu mua (chưa có HĐ mua) + Ngoài báo cáo (Danh mục hàng hóa) ===== */
let GM = { term:'', src:'all', sel:new Set(), list:[] };  // sel giữ tham chiếu object hàng hóa
function gmCandidates(){
  const inContract = new Set(SEED.products.map(p=>p.code));   // ẩn mã đã có trong HĐ
  return SEED.reportPool.concat(SEED.catalogProducts).filter(p=>!inContract.has(p.code));
}
// Lấy text phiếu / khách hàng để hiển thị & tìm kiếm (pool item có thể ở dạng purposes[] gộp hoặc phẳng).
function gmPurpose(p){
  if(Array.isArray(p.purposes) && p.purposes.length){
    return { proposal:p.purposes.map(x=>x.proposal).join(' / '), customer:p.purposes.map(x=>x.customer||'—').join(' / ') };
  }
  return { proposal:p.proposal||'—', customer:p.customer||'—' };
}
function gmHasPp(p){
  if(Array.isArray(p.purposes) && p.purposes.length) return p.purposes.some(x=>x.proposal && x.proposal!=='—');
  return !!(p.proposal && p.proposal!=='—');
}
function gmMatch(p){
  const hasPp = gmHasPp(p);
  if(GM.src==='withpp' && !hasPp) return false;
  if(GM.src==='nopp'   &&  hasPp) return false;
  const t = GM.term.trim().toLowerCase(); if(!t) return true;
  const pp = gmPurpose(p);
  return [p.name,p.code,p.maker,pp.proposal,pp.customer].some(v=>String(v||'').toLowerCase().includes(t));
}
function gmPill(p){
  return gmHasPp(p)
    ? '<span class="gm-pill gm-pill-rep">Theo phiếu đề xuất</span>'
    : '<span class="gm-pill gm-pill-cat">Không theo phiếu</span>';
}
function gmRenderRows(){
  GM.list = gmCandidates().filter(gmMatch);
  const tbody = document.getElementById('gm-tbody');
  if(!GM.list.length){ tbody.innerHTML = `<tr><td colspan="10" class="text-center text-muted py-3">Không còn hàng hóa phù hợp.</td></tr>`; }
  else tbody.innerHTML = GM.list.map((p,k)=>`
    <tr class="${GM.sel.has(p)?'gm-sel':''}" data-k="${k}">
      <td class="text-center"><input type="checkbox" class="gm-chk" ${GM.sel.has(p)?'checked':''}></td>
      <td class="text-center">${k+1}</td>
      <td>${p.name||''}</td>
      <td>${p.code||''}</td>
      <td class="text-center">${p.unit||''}</td>
      <td>${p.maker||''}</td>
      <td class="num">${(p.proposedQty===null||p.proposedQty===undefined||p.proposedQty==='')?'—':fmtN(p.proposedQty)}</td>
      <td>${gmPurpose(p).proposal}</td>
      <td>${gmPurpose(p).customer}</td>
      <td class="text-center">${gmPill(p)}</td>
    </tr>`).join('');
  const all = document.getElementById('gm-all');
  const selVis = GM.list.filter(p=>GM.sel.has(p)).length;
  if(all){ all.checked = GM.list.length>0 && selVis===GM.list.length; all.indeterminate = selVis>0 && selVis<GM.list.length; }
  const cnt = document.getElementById('gm-count'); if(cnt) cnt.textContent = GM.sel.size;
}

    [...GM.sel].forEach(p=>addPoolItem(p));
    close();
    renderProducts();
  });
}
function bindProductEvents(){
  document.getElementById('btn-add-goods').addEventListener('click', openGoodsModal);
  document.getElementById('btn-filter').addEventListener('click', ()=>{ const b=document.getElementById('filter-box'); b.style.display=b.style.display==='none'?'':'none'; });
  const applyFlt=()=>{ STATE.pFilter={ name:document.getElementById('flt-name').value.trim(), code:document.getElementById('flt-code').value.trim(), noProposal:document.getElementById('flt-noproposal').checked }; renderProducts(); };
  const fa=document.getElementById('flt-apply'); if(fa) fa.addEventListener('click', applyFlt);
  const fr=document.getElementById('flt-reset'); if(fr) fr.addEventListener('click', ()=>{ STATE.pFilter=null; renderProducts(); });
  document.querySelectorAll('.btn-del-row').forEach(b=>b.addEventListener('click',()=>removeRow(+b.dataset.idx)));
  document.querySelectorAll('.btn-unlink-purpose').forEach(b=>b.addEventListener('click',()=>{
    if(!confirm('Bỏ gắn tất cả phiếu đề xuất cho dòng này? Dòng sẽ tính là mua ngoài phiếu đề xuất.')) return;
    const p=SEED.products[+b.dataset.idx]; p.purposes=[]; p.proposedQty=null;
    renderProducts();
  }));
  document.querySelectorAll('.inp-field').forEach(i=>i.addEventListener('input',()=>{
    const p=SEED.products[+i.dataset.idx], f=i.dataset.field;
    p[f] = (i.type==='number') ? +i.value : i.value;
    if(f==='price'||f==='orderQty'){
      const tr=i.closest('tr');
      const ac=tr.querySelector('.cell-amount'); if(ac) ac.textContent=fmtN(amountOf(p));
      renderTotals();
    }
  }));
}
/* ===== FOOTER: LƯU / LƯU VÀ GỬI ===== */
function validateRequired(){
  const missing = [];
  [['sel-supplier','Nhà cung cấp'],['f-number','Số hợp đồng'],['f-name','Tên hợp đồng'],['ben-a-rep','Đại diện Bên Mua'],['ben-b-rep','Đại diện Bên Bán']]
    .forEach(([id,lbl])=>{ const el=document.getElementById(id); if(el && !el.value.trim()) missing.push(lbl); });
  if(!SEED.products.length) missing.push('Hàng hóa (ít nhất 1 dòng)');
  return missing;
}
function doSave(send){
  const miss = validateRequired();
  if(miss.length){ alert('Vui lòng nhập: '+miss.join(', ')); return; }
  const loai = STATE.contractType==='thuong_mai'?'Thương mại':'Nguyên tắc';
  alert(`Đã ${send?'lưu và gửi':'lưu'} hợp đồng mua (loại ${loai}) gồm ${SEED.products.length} hàng hóa.\n(Demo — chưa ghi dữ liệu thật.)`);
}
function bindFooter(){
  document.getElementById('btn-cancel').addEventListener('click', ()=>{ if(confirm('Hủy và rời form?')) location.reload(); });
  document.getElementById('btn-save').addEventListener('click', ()=>doSave(false));
  document.getElementById('btn-save-send').addEventListener('click', ()=>doSave(true));
}

/* ===== KHỞI TẠO ===== */
function initGeneral(){
  renderGeneral();
  document.getElementById('sel-type').addEventListener('change', e=>onContractTypeChange(e.target.value));
  document.getElementById('sel-company').addEventListener('change', e=>fillParty('ben-a', SEED.companies.find(c=>c.id===e.target.value)));
  document.getElementById('sel-supplier').addEventListener('change', e=>fillParty('ben-b', SEED.suppliers.find(c=>c.id===e.target.value)));
  document.getElementById('sel-company').value='TA'; fillParty('ben-a', SEED.companies[0]);
  document.getElementById('sel-supplier').value='HA'; fillParty('ben-b', SEED.suppliers[0]);
  renderProducts();
  bindFooter();
  onContractTypeChange('nguyen_tac');
}
document.addEventListener('DOMContentLoaded', initGeneral);
</script>
