<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lập hợp đồng mua — Demo</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/mdi/6.5.95/css/materialdesignicons.min.css">
<style>
  body{ background:#f4f6f9; font-size:13px; color:#212529; }
  .pages-container{ max-width:1500px; margin:14px auto; padding:0 16px 60px; }
  .page-header{ display:flex; align-items:center; gap:10px; margin-bottom:12px; }
  .page-header h3{ font-size:18px; margin:0; }
  .breadcrumb{ background:transparent; padding:4px 0; margin:0; font-size:12px; }
  .category-card{ background:#fff; border:1px solid #e3e8ee; border-radius:6px; padding:14px 16px; margin-bottom:14px; }
  .category-card h4{ font-size:14px; font-weight:600; margin-bottom:10px; color:#2c3e50; }
  label{ font-size:12px; font-weight:500; margin-bottom:3px; }
  .req{ color:#dc3545; font-weight:700; margin-left:2px; }
  .form-control, .custom-select{ font-size:12.5px; }
  .nav-tabs.nav-bordered{ border-bottom:2px solid #e3e8ee; }
  .nav-tabs.nav-bordered .nav-link{ border:0; border-bottom:2px solid transparent; color:#6c757d; font-size:13px; padding:8px 14px; }
  .nav-tabs.nav-bordered .nav-link.active{ color:#0d6efd; border-bottom-color:#0d6efd; background:transparent; }
  .nav-tabs.nav-bordered .nav-link.tab-error{ color:#dc3545; }
  .equal-width{ width:120px !important; }
  .col-thuongmai{ display:none; }
  body.mode-thuongmai .col-thuongmai{ display:table-cell; }
  .editor-box{ border:1px solid #ced4da; border-radius:4px; min-height:280px; padding:10px 12px; background:#fff; overflow:auto; font-size:12.5px; line-height:1.5; }
  .editor-box h5{ font-size:13px; font-weight:700; margin:10px 0 4px; }
  /* ===== Bảng hàng hóa kiểu HĐ bán ===== */
  .product-table{ font-size:12px; margin-bottom:8px; width:auto; min-width:100%; }
  .product-table thead.thead-sticky th{ position:sticky; top:0; z-index:2; background:#eef4f3; color:#2c3e50; font-size:11.5px; font-weight:600; text-align:center; vertical-align:middle; white-space:nowrap; border:1px solid #d9e2e0; }
  .product-table td{ vertical-align:middle; border:1px solid #e3e8ee; padding:4px 6px; white-space:nowrap; }
  .product-table td.num, .product-table th.num{ text-align:right; }
  .product-table .warning-row td{ background:#fcefec; }
  .product-table input.form-control-sm{ font-size:11.5px; height:28px; }
  .product-table .cell-name{ white-space:nowrap; }
  .product-table .cell-name .sub{ font-size:10.5px; color:#8a97a3; }
  .product-table input.inp-note{ min-width:170px; }
  .drag-handle{ cursor:grab; text-align:center; color:#7a8894; }
  .total-block .row{ margin-bottom:2px; }
  .btn-xs{ padding:2px 7px; font-size:11px; }
  .filter-wrap{ background:#f7faf9; border:1px solid #e3e8ee; border-radius:6px; padding:10px 12px; margin-top:6px; }
  .product-table td.cell-purpose{ white-space:nowrap; line-height:1.6; }
  .cell-purpose .pp-lb{ color:#8a97a3; font-size:10.5px; }
  .cell-purpose .pp-sep{ color:#c0c8d0; font-weight:600; padding:0 2px; }
  .cell-purpose .pp-qty{ display:inline-block; background:#e3f1ff; color:#0d6efd; font-weight:600; font-size:10.5px; border-radius:9px; padding:0 7px; margin-left:3px; white-space:nowrap; }
  .cell-purpose .pp-multi{ color:#e07b00; font-weight:600; font-size:10.5px; border-bottom:1px dashed #f0d9b8; margin-bottom:2px; padding-bottom:1px; }
  .cell-purpose .pp-none{ color:#8a97a3; font-style:italic; }
  .cell-purpose .pp-line{ display:flex; align-items:center; flex-wrap:nowrap; gap:2px; padding:1px 0; }
  .cell-purpose .pp-buy-wrap{ color:#1e8e4e; font-weight:600; font-size:10.5px; margin-left:auto; padding-left:10px; white-space:nowrap; }
  .cell-purpose input.pp-buy{ width:52px; height:22px; font-size:11px; font-weight:600; color:#1e8e4e; padding:1px 4px; border:1px solid #b7dcc6; background:#f4fbf7; border-radius:3px; text-align:right; margin-left:3px; }
  .cell-purpose input.pp-buy:focus{ outline:none; border-color:#1e8e4e; background:#fff; }
  .product-table td.cell-propsum{ background:#f7faf9; color:#2c3e50; }
  .product-table tr.total-row td{ background:#eef4f3; color:#2c3e50; font-weight:700; font-size:12.5px; }

  .product-table input.inp-oq{ min-width:72px; }
  .product-table input.inp-oq.oq-over{ background:#fdecea; border-color:#e74c3c; color:#c0392b; font-weight:700; }
  .product-table input.inp-oq.oq-under{ background:#fff8e1; border-color:#f0ad4e; color:#a97812; font-weight:700; }
  .oq-legend{ display:inline-block; width:12px; height:12px; border-radius:3px; vertical-align:-1px; margin:0 3px 0 8px; border:1px solid transparent; }
  .oq-legend.over{ background:#fdecea; border-color:#e74c3c; }
  .oq-legend.under{ background:#fff8e1; border-color:#f0ad4e; }
  .product-table .cell-code{ font-family:ui-monospace,SFMono-Regular,Menlo,monospace; font-size:11px; white-space:nowrap; }
  .btn-unlink-purpose{ border:0; background:transparent; color:#c0392b; padding:0 2px; cursor:pointer; font-size:13px; line-height:1; }
  .btn-unlink-purpose:hover{ color:#e74c3c; }
  /* ===== Modal chọn hàng hóa ===== */
  .gm-overlay{ position:fixed; inset:0; background:rgba(0,0,0,.4); z-index:1050; display:flex; align-items:flex-start; justify-content:center; padding:40px 16px; overflow:auto; }
  .gm-dialog{ background:#fff; border-radius:8px; width:100%; max-width:1040px; box-shadow:0 10px 40px rgba(0,0,0,.3); }
  .gm-head{ padding:12px 16px; border-bottom:1px solid #e3e8ee; display:flex; justify-content:space-between; align-items:center; }
  .gm-head h4{ margin:0; font-size:15px; font-weight:600; color:#2c3e50; }
  .gm-body{ padding:12px 16px; max-height:60vh; overflow:auto; }
  .gm-foot{ padding:12px 16px; border-top:1px solid #e3e8ee; display:flex; justify-content:space-between; align-items:center; }
  .gm-table{ font-size:12px; margin-bottom:0; }
  .gm-table thead th{ position:sticky; top:0; background:#eef4f3; color:#2c3e50; font-size:11.5px; font-weight:600; text-align:center; vertical-align:middle; border:1px solid #d9e2e0; }
  .gm-table td{ vertical-align:middle; border:1px solid #e3e8ee; padding:4px 6px; }
  .gm-table td.num, .gm-table th.num{ text-align:right; }
  .gm-table tbody tr{ cursor:pointer; }
  .gm-table tbody tr.gm-sel td{ background:#eaf4ff; }
  .gm-pill{ display:inline-block; padding:1px 8px; border-radius:10px; font-size:10.5px; font-weight:600; white-space:nowrap; }
  .gm-pill-rep{ background:#e3f1ff; color:#0d6efd; }
  .gm-pill-cat{ background:#fff3e0; color:#e07b00; }
  .gm-pill-merge{ background:#e8f6ee; color:#1e8e4e; margin-top:2px; }
  /* ===== Tab Mẫu in — bản xem trước hợp đồng khổ A4 ===== */
  .print-toolbar{ max-width:820px; margin:0 auto 10px; display:flex; justify-content:space-between; align-items:center; }
  .print-sheet{ background:#fff; max-width:820px; margin:0 auto; padding:48px 56px; border:1px solid #d9e2e0; box-shadow:0 2px 10px rgba(0,0,0,.06); font-family:'Times New Roman', Times, serif; font-size:13.5px; color:#111; line-height:1.55; }

  .print-sheet .quochieu .l1{ font-weight:700; text-transform:uppercase; }
  .print-sheet .quochieu .l2{ font-weight:700; text-decoration:underline; }
  .print-sheet h1{ font-size:17px; font-weight:700; text-align:center; text-transform:uppercase; margin:20px 0 2px; font-family:inherit; }
  .print-sheet .contract-no{ text-align:center; margin-bottom:14px; }
  .print-sheet h5{ font-size:13.5px; font-weight:700; margin:12px 0 4px; font-family:inherit; }
  .print-sheet .party{ margin-bottom:8px; }
  .print-sheet .party b.pname{ text-transform:uppercase; }
  .print-sheet table{ width:100%; border-collapse:collapse; margin:8px 0 4px; }
  .print-sheet table th, .print-sheet table td{ border:1px solid #333; padding:3px 6px; font-size:12px; vertical-align:middle; }
  .print-sheet table th{ text-align:center; font-weight:700; background:#f2f2f2; }
  .print-sheet table td.num{ text-align:right; }
  .print-sheet .sign-row{ display:flex; justify-content:space-between; margin-top:28px; text-align:center; }
  .print-sheet .sign-row .sig{ width:45%; }
  .print-sheet .sign-row .sig .role{ font-weight:700; text-transform:uppercase; }
  .print-sheet .sign-row .sig .hint{ font-style:italic; font-size:12px; }
  .print-sheet .sign-row .sig .who{ margin-top:70px; font-weight:700; }

  .pay-nguyentac, .pay-thuongmai{ display:none; }
  body.mode-nguyentac .pay-nguyentac{ display:block; }
  body.mode-thuongmai .pay-thuongmai{ display:block; }
  .pay-table{ font-size:12.5px; margin-bottom:6px; }
  .pay-table th{ background:#eef4f3; color:#2c3e50; font-size:11.5px; font-weight:600; text-align:center; vertical-align:middle; }
  .pay-table td{ vertical-align:middle; }
  .pay-table td.num, .pay-table th.num{ text-align:right; }
  .pay-table tfoot td{ background:#f7faf9; }
  .pay-pct-sum-ok{ color:#1e8e4e; font-weight:700; }
  .pay-pct-sum-bad{ color:#dc3545; font-weight:700; }
  /* Chuyển đổi hình thức thanh toán trong HĐ thương mại: theo đợt / theo đơn */
  .pay-mode-switch{ display:flex; align-items:center; gap:10px; margin-bottom:12px; }
  .pay-term-table{ font-size:12.5px; margin-bottom:6px; }
  .pay-term-table th{ background:#eef4f3; color:#2c3e50; font-size:11.5px; font-weight:600; vertical-align:middle; }
  .pay-term-table td{ vertical-align:middle; }
  .pay-term-table .term-name{ font-weight:600; font-size:13px; color:#1d1d1f; }
  .pay-term-table .term-meta{ font-size:11.5px; color:#86868b; margin-top:2px; }
  .pay-term-table tr.pay-term-locked{ opacity:.4; }
  .pay-term-table tr.pay-term-off .term-name{ color:#6c757d; }
  .pay-alert-exclusive{ background:#fff5e6; border-radius:8px; padding:10px 14px; display:flex; align-items:flex-start; gap:8px; font-size:12.5px; color:#b25e00; line-height:1.5; margin-top:10px; }
  @media print{
    body *{ visibility:hidden; }
    #print-sheet, #print-sheet *{ visibility:visible; }
    #print-sheet{ position:absolute; left:0; top:0; width:100%; max-width:none; border:0; box-shadow:none; padding:0; }
  }
</style>
</head>

function computeDuration(){
  const el = document.getElementById('f-duration'); if(!el) return;
  const s = document.getElementById('f-sign')?.value, e = document.getElementById('f-end')?.value;
  if(!s || !e){ el.value=''; return; }

  el.value = days>=0 ? `${fmtN(days)} ngày` : 'Ngày kết thúc phải sau ngày ký';
}

// Dựng các dòng "Thanh toán theo đơn" (đồng bộ màn HĐ bán). Tick "100% trước giao" → khóa 3 dòng còn lại.
function payDonRows(){
  const hasExclusive = STATE.payTheoDon.some((t,i)=>PAY_DON_TERMS[i].exclusive && t.enabled);
  return PAY_DON_TERMS.map((def,i)=>{
    const t = STATE.payTheoDon[i];
    const rowLocked = hasExclusive && !def.exclusive;
    const cls = rowLocked ? 'pay-term-locked' : (!t.enabled ? 'pay-term-off' : '');
    const inpDis = !t.enabled || rowLocked;
    const cell = field => {
      if(def.field!==field) return '<span class="text-muted">—</span>';
      if(field==='max_value')
        return `<input type="text" inputmode="numeric" class="form-control form-control-sm text-right pay-don-money" data-i="${i}" value="${t.max_value?fmtN(t.max_value):''}" placeholder="VD: 500.000.000" ${inpDis?'disabled':''}>`;
      return `<input type="number" min="1" class="form-control form-control-sm text-right pay-don-num" data-i="${i}" data-field="${field}" value="${t[field]||''}" placeholder="${field==='max_days'?'VD: 30':'VD: 3'}" ${inpDis?'disabled':''}>`;
    };
    return `<tr class="${cls}">
      <td class="text-center align-middle"><input type="checkbox" class="pay-don-chk" data-i="${i}" ${t.enabled?'checked':''} ${rowLocked?'disabled':''}></td>
      <td class="align-middle"><div class="term-name">${def.name}</div><div class="term-meta">${def.meta}</div></td>
      <td class="num align-middle">${cell('max_days')}</td>
      <td class="num align-middle">${cell('max_value')}</td>
      <td class="num align-middle">${cell('max_orders')}</td>
    </tr>`;
  }).join('');
}
function payRecalc(){
  const host = document.getElementById('pay-card'); if(!host || !host.querySelector('.pay-table')) return;
  const P = STATE.payThuongMai, total = contractTotal();
  let sumPct=0, sumAmt=0;
  host.querySelectorAll('.pay-table tbody tr[data-row]').forEach(tr=>{
    const i=+tr.dataset.row, pct=Number(P.rows[i]?.pct)||0, amt=Math.round(pct/100*total);
    sumPct+=pct; sumAmt+=amt;
    const c=tr.querySelector('.pay-amt'); if(c) c.textContent=fmtN(amt);
  });
  const ps=document.getElementById('pay-sum-pct'); if(ps){ ps.textContent=fmtN(sumPct)+'%'; ps.className='num '+(sumPct===100?'pay-pct-sum-ok':'pay-pct-sum-bad'); }
  const addBtn=document.getElementById('pay-add'); if(addBtn){ addBtn.disabled = sumPct>=100; addBtn.title = sumPct>=100?'Tổng tỷ lệ đã đủ 100% — không thể thêm đợt':''; }
  const as=document.getElementById('pay-sum-amt'); if(as) as.textContent=fmtN(sumAmt);
  const wn=document.getElementById('pay-warn'); if(wn) wn.style.display=(!P.rows.length||sumPct===100)?'none':'';
}

      STATE.payTheoDon.forEach((t,k)=>{ if(!PAY_DON_TERMS[k].exclusive) t.enabled=false; });

  host.querySelectorAll('.pay-don-num').forEach(el=>el.addEventListener('input', e=>{

    STATE.payTheoDon[i][f] = v===''?'':(parseInt(v)||'');
  }));
  host.querySelectorAll('.pay-don-money').forEach(el=>el.addEventListener('input', e=>{
    const i=+e.target.dataset.i, raw=e.target.value.replace(/\D/g,'');
    STATE.payTheoDon[i].max_value = raw?+raw:''; e.target.value = raw?fmtN(+raw):'';

/* ===== TAB 2: HÀNG HÓA ===== */
/* Bố cục cột theo logic đọc từ trái sang phải:
   ① ĐỊNH DANH HÀNG:  STT · Mã hàng · Tên hàng · Quy cách · ĐVT · Hãng/Nước SX
   ② NGUỒN NHU CẦU:   Mục đích mua (Phiếu ĐX / KH / HĐ bán · SL đề xuất từng phiếu)
   ③ SỐ LƯỢNG:        SL đề xuất mua (= Σ SL các phiếu, chỉ đọc) → SL mua (mặc định = SL đề xuất, sửa được;
                       sửa LỚN hơn → nền đỏ, NHỎ hơn → nền vàng)
   ④ GIÁ TRỊ:         Đơn giá có VAT → Thành tiền
   ⑤ Ghi chú
   Loại HĐ Nguyên tắc (PL HĐ NT 143) không có số lượng → tm:true chỉ hiện khi loại HĐ = Thương mại (mẫu Qmedic). */
const COLUMNS = [
  { key:'specification',    label:'Quy cách',             prop:'spec',     type:'text',    visible:true },
  { key:'unit',             label:'Đơn vị tính',          prop:'unit',     type:'text',    visible:true },
  { key:'producer_country', label:'Hãng, nước sản xuất',  prop:'maker',    type:'text',    visible:true },
  { key:'purpose',          label:'Mục đích mua (Phiếu đề xuất / KH / HĐ bán)', type:'purpose', visible:true },
  { key:'proposed_qty',     label:'SL đề xuất mua',       type:'propsum',  visible:true, num:true, tm:true },
  { key:'order_qty',        label:'SL mua',               prop:'orderQty', type:'inpnum',  visible:true, num:true, tm:true },
  { key:'price',            label:'Đơn giá có VAT (VNĐ)', prop:'price',    type:'money',   visible:true, num:true },
  { key:'amount',           label:'Thành tiền (VNĐ)',     type:'amount',   visible:true, num:true, tm:true },
  { key:'note',             label:'Ghi chú',              prop:'note',     type:'inptext', visible:true, tm:true },
];
function visibleCols(){ return COLUMNS.filter(c=>c.visible && (!c.tm || STATE.contractType==='thuong_mai')); }
/* SL đề xuất mua = Σ SL đề xuất (qty) của các phiếu gắn vào dòng (chỉ đọc).
   SL mua nhập được ở CẢ 2 MỨC:
   - theo TỪNG PHIẾU (buyQty, input "Mua" trong cột Mục đích mua; mặc định = SL đề xuất của phiếu)
     → gõ ở đây thì cột SL mua tự cập nhật = Σ buyQty;
   - hoặc sửa TRỰC TIẾP cột SL mua (mặc định = SL đề xuất).
   SL mua lệch khỏi SL đề xuất → cảnh báo màu (lớn hơn: đỏ, nhỏ hơn: vàng).
   Hàng không có phiếu → không có mốc so sánh, nhập tự do. */
function hasPurposes(p){ return Array.isArray(p.purposes) && p.purposes.some(x=>x && x.proposal && x.proposal!=='—'); }
function propSum(p){ return hasPurposes(p) ? p.purposes.reduce((s,x)=>s+(Number(x.qty)||0),0) : null; }
function buySum(p){ return (p.purposes||[]).reduce((s,x)=>s+(Number(x.buyQty)||0),0); }
function orderQtyOf(p){ return Number(p.orderQty)||0; }
function oqWarn(p){
  const prop = propSum(p); if(prop===null) return '';
  const oq = orderQtyOf(p);
  return oq>prop ? 'oq-over' : (oq<prop ? 'oq-under' : '');
}
function oqTip(w){ return w==='oq-over' ? 'Mua NHIỀU hơn tổng SL đề xuất' : (w==='oq-under' ? 'Mua ÍT hơn tổng SL đề xuất' : ''); }
function amountOf(p){ return (Number(p.price)||0)*orderQtyOf(p); }
function esc(s){ return String(s==null?'':s).replace(/"/g,'&quot;'); }
function docSo(n){
  const chu=['không','một','hai','ba','bốn','năm','sáu','bảy','tám','chín'];
  function doc3(num, full){
    const t=Math.floor(num/100), ch=Math.floor((num%100)/10), dv=num%10; let s='';
    if(t>0) s+=chu[t]+' trăm'; else if(full) s+='không trăm';
    if(ch>1){ s+=' '+chu[ch]+' mươi'; if(dv===1) s+=' mốt'; else if(dv===5) s+=' lăm'; else if(dv>0) s+=' '+chu[dv]; }
    else if(ch===1){ s+=' mười'; if(dv===5) s+=' lăm'; else if(dv>0) s+=' '+chu[dv]; }
    else if(dv>0){ if(t>0||full) s+=' lẻ'; s+=' '+chu[dv]; }
    return s.trim();
  }
  n=Math.round(Number(n)||0); if(n<=0) return 'Không đồng';
  const units=['',' nghìn',' triệu',' tỷ']; let g=[], m=n;
  while(m>0){ g.push(m%1000); m=Math.floor(m/1000); }
  let top=g.length-1; while(top>0 && g[top]===0) top--;
  let out='';
  for(let i=g.length-1;i>=0;i--){ if(g[i]===0) continue; out+=doc3(g[i], i!==top)+units[i]+' '; }
  out=out.trim().replace(/\s+/g,' ');
  return out.charAt(0).toUpperCase()+out.slice(1)+' đồng./.';
}

function cellFor(col, idx, p){
  const gi = `data-idx="${idx}"`;
  switch(col.type){
    case 'text':   return `<td>${p[col.prop]||''}</td>`;
    case 'inpnum': {
      // SL mua: input sửa trực tiếp (mặc định = SL đề xuất); lệch khỏi SL đề xuất → đổi màu cảnh báo.
      const w = oqWarn(p);
      return `<td class="num"><input type="number" min="0" class="form-control form-control-sm text-right inp-field inp-oq ${w}" ${gi} data-field="${col.prop}" value="${p[col.prop]||0}" title="${oqTip(w)}"></td>`;
    }
    case 'propsum': { const v = propSum(p); return `<td class="num cell-propsum">${v===null?'—':`<b>${fmtN(v)}</b>`}</td>`; }
    case 'money':  return `<td class="num"><input type="text" inputmode="numeric" class="form-control form-control-sm text-right inp-money" ${gi} value="${fmtN(p.price)}"></td>`;
    case 'inptext':return `<td><input class="form-control form-control-sm inp-field inp-note" ${gi} data-field="${col.prop}" value="${esc(p[col.prop])}"></td>`;
    case 'ronum':  { const v=p[col.prop]; return `<td class="num">${(v===null||v===undefined||v==='')?'—':fmtN(v)}</td>`; }
    case 'amount': return `<td class="num cell-amount">${fmtN(amountOf(p))}</td>`;
    case 'purpose':{
      const list = Array.isArray(p.purposes) ? p.purposes.filter(x=>x && x.proposal && String(x.proposal).trim() && x.proposal!=='—') : [];
      if(!list.length) return `<td class="cell-purpose"><span class="pp-none"><i class="mdi mdi-cart-plus"></i> Mua ngoài phiếu đề xuất</span></td>`;
      const tm = STATE.contractType==='thuong_mai';
      const multi = list.length>1;
      const head = multi ? `<div class="pp-multi"><i class="mdi mdi-call-merge"></i> Gộp ${list.length} phiếu đề xuất${tm?' — nhập SL mua từng phiếu':''}</div>` : '';
      const lines = list.map((x,k)=>{
        const parts = [`<b>${x.proposal}</b>`, x.customer||'—'];
        if(x.saleContract && x.saleContract!=='—') parts.push(x.saleContract);
        const q = (x.qty===null||x.qty===undefined||x.qty==='') ? '' : `<span class="pp-qty">ĐX ${fmtN(x.qty)}</span>`;
        const buy = tm ? `<span class="pp-buy-wrap">Mua <input type="number" min="0" class="pp-buy inp-purpose-buy" ${gi} data-pi="${k}" value="${x.buyQty??(x.qty||0)}" title="SL đặt mua theo phiếu ${x.proposal}"></span>` : '';
        return `<div class="pp-line">${parts.join('<span class="pp-sep"> / </span>')} ${q}${buy}</div>`;
      }).join('');
      return `<td class="cell-purpose">${head}${lines}
        <button type="button" class="btn-unlink-purpose" data-idx="${idx}" title="Bỏ gắn tất cả phiếu đề xuất (mua ngoài phiếu)"><i class="mdi mdi-link-variant-off"></i></button></td>`;
    }
  }
  return '<td></td>';
}
function matchFilter(p){
  const f = STATE.pFilter; if(!f) return true;
  const norm = s => String(s||'').toLowerCase();
  if(f.name && !norm(p.name).includes(f.name.toLowerCase())) return false;
  if(f.code && !norm(p.code).includes(f.code.toLowerCase())) return false;
  if(f.noProposal){ const has=Array.isArray(p.purposes) && p.purposes.some(x=>x && x.proposal && x.proposal!=='—'); if(has) return false; }
  return true;
}
function productRow(pi, p, stt){
  const cols = visibleCols();
  return `<tr>
    <td class="drag-handle">${stt}</td>
    <td class="cell-code">${p.code||''}</td>
    <td class="cell-name">${p.name||''}${p.tradeName&&p.tradeName!=='—'?`<div class="sub">${p.tradeName}</div>`:''}</td>
    ${cols.map(c=>cellFor(c, pi, p)).join('')}

}

window.renderTotals = function(){
  const tm = STATE.contractType==='thuong_mai';
  const tb = document.getElementById('total-block'); if(tb) tb.style.display = tm?'':'none';
  let after=0, sProp=0, sOq=0;
  SEED.products.forEach(p=>{ after += amountOf(p); const pr=propSum(p); if(pr!==null) sProp += pr; sOq += orderQtyOf(p); });
  const a=document.getElementById('tot-after'); if(a) a.textContent=fmtN(after);
  const w=document.getElementById('tot-words'); if(w) w.textContent=docSo(after);
  // Dòng TỔNG CỘNG đầu bảng hàng hóa
  const tp=document.getElementById('trow-prop');   if(tp) tp.textContent=fmtN(sProp);
  const to=document.getElementById('trow-oq');     if(to) to.textContent=fmtN(sOq);
  const ta=document.getElementById('trow-amount'); if(ta) ta.textContent=fmtN(after);
  // Số tiền các đợt thanh toán (HĐ thương mại) phụ thuộc tổng giá trị HĐ → cập nhật theo.
  if(typeof payRecalc==='function') payRecalc();
};
function removeRow(idx){
  if(!confirm('Xóa hàng hóa này khỏi hợp đồng?')) return;
  // Picker giữ nguyên hàng gốc (không tiêu thụ) → xóa dòng chỉ cần bỏ khỏi hợp đồng, không cần trả lại pool.
  SEED.products.splice(idx,1);
  renderProducts();
}
/* ===== THÊM HÀNG VÀO HĐ — quy về mã hàng (không tách): mã đã có → cộng dồn SL + ghép phiếu; mã mới → tạo dòng ===== */
function sumQty(a,b){ const an=(a===null||a===undefined||a===''), bn=(b===null||b===undefined||b===''); if(an&&bn) return null; return (Number(a)||0)+(Number(b)||0); }
function poolToLine(pi){
  const line = Object.assign({}, pi);
  if(Array.isArray(pi.purposes)){
    line.purposes = pi.purposes.map(x=>Object.assign({}, x));
  } else {
    line.purposes = (pi.proposal && pi.proposal!=='—')
      ? [{proposal:pi.proposal, customer:pi.customer, saleContract:pi.saleContract, qty:pi.proposedQty, buyQty:pi.proposedQty}] : [];
  }
  // buyQty mặc định = SL đề xuất của từng phiếu (nếu pool item gộp sẵn mà thiếu buyQty).
  line.purposes.forEach(x=>{ if(x.buyQty===undefined||x.buyQty===null) x.buyQty = Number(x.qty)||0; });
  delete line.proposal; delete line.customer; delete line.saleContract;
  if(hasPurposes(line)) line.orderQty = buySum(line);
  return line;
}
function addPoolItem(pi){
  const line = poolToLine(pi);
  const ex = SEED.products.find(x=>x.code===line.code);
  if(!ex){ SEED.products.push(line); return; }
  ex.proposedQty = sumQty(ex.proposedQty, line.proposedQty);
  if(!Array.isArray(ex.purposes)) ex.purposes = [];
  (line.purposes||[]).forEach(np=>{ if(!ex.purposes.some(q=>q.proposal===np.proposal && q.customer===np.customer)) ex.purposes.push(np); });
  // Ghép thêm phiếu → SL mua của dòng = Σ SL mua các phiếu; hàng không phiếu cộng dồn trực tiếp.
  ex.orderQty = hasPurposes(ex) ? buySum(ex) : (Number(ex.orderQty)||0)+(Number(line.orderQty)||0);
}
/* ===== MODAL CHỌN HÀNG HÓA — 2 nguồn: Trong Báo cáo nhu cầu mua (chưa có HĐ mua) + Ngoài báo cáo (Danh mục hàng hóa) ===== */
let GM = { term:'', src:'all', sel:new Set(), list:[] };  // sel giữ tham chiếu object hàng hóa
function gmCandidates(){
  return SEED.reportPool.concat(SEED.catalogProducts).filter(p=>{
    const ex = SEED.products.find(x=>x.code===p.code);
    if(!ex) return true;                                   // mã chưa có trong HĐ → hiện
    if(Array.isArray(p.purposes)) return false;            // bản gộp sẵn của dòng đã vào HĐ → ẩn
    if(!p.proposal || p.proposal==='—') return false;      // hàng danh mục / không phiếu mà mã đã có → ẩn
    // Mã đã có trong HĐ nhưng đây là PHIẾU ĐỀ XUẤT KHÁC chưa ghép → vẫn hiện để chọn ghép thêm.
    return !(ex.purposes||[]).some(q=>q.proposal===p.proposal && q.customer===p.customer);
  });
}
function gmInContract(p){ return SEED.products.some(x=>x.code===p.code); }
// Lấy text phiếu / khách hàng để hiển thị & tìm kiếm (pool item có thể ở dạng purposes[] gộp hoặc phẳng).
function gmPurpose(p){
  if(Array.isArray(p.purposes) && p.purposes.length){
    return { proposal:p.purposes.map(x=>x.proposal).join(' / '), customer:p.purposes.map(x=>x.customer||'—').join(' / ') };
  }
  return { proposal:p.proposal||'—', customer:p.customer||'—' };
}
function gmHasPp(p){
  if(Array.isArray(p.purposes) && p.purposes.length) return p.purposes.some(x=>x.proposal && x.proposal!=='—');
  return !!(p.proposal && p.proposal!=='—');
}
// Công ty thực hiện (Bên mua) suy ra từ phiếu đề xuất → chỉ hàng THEO phiếu mới có.
// Hàng không theo phiếu (danh mục chung) không gắn nhu cầu mua nào → để "—".
const ITEM_COMPANY = {
  'HH-09':'Thành An', 'HH-01':'Thành An', 'HH-02':'Thành An', 'HH-03':'Thành An',
  'HH-04':'Thành An - CN HCM',
  'HH-05':'Thành An', 'HH-05b':'Thành An', 'HH-06':'Thành An - CN HCM',
  'HH-07':'Thành An', 'HH-08':'Thành An',
};
function gmCompany(p){ return gmHasPp(p) ? (p.company || ITEM_COMPANY[p.internalCode] || '—') : '—'; }
function gmMatch(p){
  const hasPp = gmHasPp(p);
  if(GM.src==='withpp' && !hasPp) return false;
  if(GM.src==='nopp'   &&  hasPp) return false;
  const t = GM.term.trim().toLowerCase(); if(!t) return true;
  const pp = gmPurpose(p);
  return [p.name,p.code,p.maker,pp.proposal,pp.customer,gmCompany(p)].some(v=>String(v||'').toLowerCase().includes(t));
}
function gmPill(p){
  const src = gmHasPp(p)
    ? '<span class="gm-pill gm-pill-rep">Theo phiếu đề xuất</span>'
    : '<span class="gm-pill gm-pill-cat">Không theo phiếu</span>';
  const merge = gmInContract(p) ? '<br><span class="gm-pill gm-pill-merge" title="Mã hàng đã có trong hợp đồng — chọn sẽ ghép phiếu này vào dòng sẵn có và cộng dồn số lượng">Ghép vào dòng sẵn có</span>' : '';
  return src + merge;
}
function gmRenderRows(){
  GM.list = gmCandidates().filter(gmMatch);
  const tbody = document.getElementById('gm-tbody');
  if(!GM.list.length){ tbody.innerHTML = `<tr><td colspan="11" class="text-center text-muted py-3">Không còn hàng hóa phù hợp.</td></tr>`; }
  else tbody.innerHTML = GM.list.map((p,k)=>`
    <tr class="${GM.sel.has(p)?'gm-sel':''}" data-k="${k}">
      <td class="text-center"><input type="checkbox" class="gm-chk" ${GM.sel.has(p)?'checked':''}></td>
      <td class="text-center">${k+1}</td>
      <td>${p.name||''}</td>
      <td>${p.code||''}</td>
      <td class="text-center">${p.unit||''}</td>
      <td>${p.maker||''}</td>
      <td class="num">${(p.proposedQty===null||p.proposedQty===undefined||p.proposedQty==='')?'—':fmtN(p.proposedQty)}</td>
      <td>${gmPurpose(p).proposal}</td>
      <td>${gmPurpose(p).customer}</td>
      <td>${gmCompany(p)}</td>
      <td class="text-center">${gmPill(p)}</td>
    </tr>`).join('');
  const all = document.getElementById('gm-all');
  const selVis = GM.list.filter(p=>GM.sel.has(p)).length;
  if(all){ all.checked = GM.list.length>0 && selVis===GM.list.length; all.indeterminate = selVis>0 && selVis<GM.list.length; }
  const cnt = document.getElementById('gm-count'); if(cnt) cnt.textContent = GM.sel.size;
}
function openGoodsModal(){
  GM = { term:'', src:'all', sel:new Set(), list:[] };
  const ov = document.createElement('div');
  ov.className='gm-overlay'; ov.id='gm-overlay';
  ov.innerHTML = `
    <div class="gm-dialog">
      <div class="gm-head">
        <h4><i class="mdi mdi-plus-box-outline"></i> Chọn hàng hóa</h4>
        <button class="btn btn-sm btn-light" id="gm-x">✕</button>
      </div>
      <div class="gm-body">
        <div class="form-row align-items-center mb-2">
          <div class="col-md-7"><input class="form-control form-control-sm" id="gm-search" placeholder="Tìm theo tên / mã hàng / hãng / phiếu đề xuất / công ty…"></div>
          <div class="col-md-5"><select class="custom-select custom-select-sm" id="gm-source">
            <option value="all">Tất cả</option>
            <option value="withpp">Theo phiếu đề xuất</option>
            <option value="nopp">Không theo phiếu đề xuất</option>
          </select></div>
        </div>
        <div class="table-responsive"><table class="table table-bordered gm-table">
          <thead><tr>
            <th style="width:40px"><input type="checkbox" id="gm-all"></th>
            <th style="width:42px">STT</th>
            <th>Tên hàng hóa</th>
            <th>Mã hàng</th>
            <th style="width:70px">ĐVT</th>
            <th>Hãng, nước SX</th>
            <th class="num" style="width:90px">SL đề xuất mua</th>
            <th>Phiếu đề xuất mua</th>
            <th>Khách hàng SD</th>
            <th style="width:150px">Công ty thực hiện</th>
            <th style="width:130px">Nguồn</th>
          </tr></thead>
          <tbody id="gm-tbody"></tbody>
        </table></div>
      </div>
      <div class="gm-foot">
        <span class="text-muted small">Đã chọn: <b id="gm-count">0</b> mặt hàng · Các dòng <b>cùng mã hàng</b> khi thêm sẽ tự gộp 1 dòng: ghép phiếu đề xuất, cộng dồn số lượng.</span>
        <span>
          <button class="btn btn-sm btn-outline-secondary" id="gm-cancel">Đóng</button>
          <button class="btn btn-sm btn-primary" id="gm-add"><i class="mdi mdi-plus"></i> Thêm vào hợp đồng</button>
        </span>
      </div>
    </div>`;
  document.body.appendChild(ov);
  gmRenderRows();
  const close=()=>ov.remove();
  ov.addEventListener('click', e=>{ if(e.target===ov) close(); });
  document.getElementById('gm-x').addEventListener('click', close);
  document.getElementById('gm-cancel').addEventListener('click', close);
  document.getElementById('gm-search').addEventListener('input', e=>{ GM.term=e.target.value; gmRenderRows(); });
  document.getElementById('gm-source').addEventListener('change', e=>{ GM.src=e.target.value; gmRenderRows(); });
  document.getElementById('gm-all').addEventListener('change', e=>{
    if(e.target.checked) GM.list.forEach(p=>GM.sel.add(p)); else GM.list.forEach(p=>GM.sel.delete(p));
    gmRenderRows();
  });
  document.getElementById('gm-tbody').addEventListener('click', e=>{
    const tr=e.target.closest('tr[data-k]'); if(!tr) return;
    const p=GM.list[+tr.dataset.k]; if(!p) return;
    if(GM.sel.has(p)) GM.sel.delete(p); else GM.sel.add(p);
    gmRenderRows();
  });
  document.getElementById('gm-add').addEventListener('click', ()=>{
    if(!GM.sel.size){ alert('Chưa chọn hàng hóa nào.'); return; }
    // Quy về mã hàng: mã đã có trong HĐ → cộng dồn SL + ghép phiếu; mã mới → tạo dòng.
    [...GM.sel].forEach(p=>addPoolItem(p));
    close();
    renderProducts();
  });
}
function bindProductEvents(){
  document.getElementById('btn-add-goods').addEventListener('click', openGoodsModal);
  document.getElementById('btn-filter').addEventListener('click', ()=>{ const b=document.getElementById('filter-box'); b.style.display=b.style.display==='none'?'':'none'; });
  const applyFlt=()=>{ STATE.pFilter={ name:document.getElementById('flt-name').value.trim(), code:document.getElementById('flt-code').value.trim(), noProposal:document.getElementById('flt-noproposal').checked }; renderProducts(); };
  const fa=document.getElementById('flt-apply'); if(fa) fa.addEventListener('click', applyFlt);
  const fr=document.getElementById('flt-reset'); if(fr) fr.addEventListener('click', ()=>{ STATE.pFilter=null; renderProducts(); });
  document.querySelectorAll('.btn-del-row').forEach(b=>b.addEventListener('click',()=>removeRow(+b.dataset.idx)));
  document.querySelectorAll('.btn-unlink-purpose').forEach(b=>b.addEventListener('click',()=>{
    if(!confirm('Bỏ gắn tất cả phiếu đề xuất cho dòng này? Dòng sẽ tính là mua ngoài phiếu đề xuất.')) return;
    const p=SEED.products[+b.dataset.idx];
    p.orderQty = orderQtyOf(p);          // giữ tổng đang mua → thành SL nhập trực tiếp
    p.purposes=[]; p.proposedQty=null;   // hết mốc so sánh → không còn cảnh báo
    renderProducts();
  }));
  // Cập nhật màu cảnh báo + thành tiền + tổng HĐ cho 1 dòng (tr) theo state hiện tại.
  function refreshRowWarn(tr, p){
    const oq = tr.querySelector('.inp-oq');
    if(oq){
      const w = oqWarn(p);
      oq.classList.remove('oq-over','oq-under'); if(w) oq.classList.add(w);
      oq.title = oqTip(w);
    }
    const ac=tr.querySelector('.cell-amount'); if(ac) ac.textContent=fmtN(amountOf(p));
    renderTotals();
  }
  document.querySelectorAll('.inp-field').forEach(i=>i.addEventListener('input',()=>{
    const p=SEED.products[+i.dataset.idx], f=i.dataset.field;
    p[f] = (i.type==='number') ? +i.value : i.value;
    if(f==='orderQty') refreshRowWarn(i.closest('tr'), p);
  }));
  // Nhập SL mua theo TỪNG phiếu đề xuất → cột SL mua tự cập nhật = Σ theo phiếu + màu cảnh báo.
  document.querySelectorAll('.inp-purpose-buy').forEach(i=>i.addEventListener('input',()=>{
    const p=SEED.products[+i.dataset.idx];
    p.purposes[+i.dataset.pi].buyQty = +i.value;
    p.orderQty = buySum(p);
    const tr=i.closest('tr');
    const oq=tr.querySelector('.inp-oq'); if(oq) oq.value = p.orderQty;
    refreshRowWarn(tr, p);
  }));
  // Đơn giá: nhập số thô, hiển thị luôn theo định dạng VN (dấu chấm ngăn cách hàng nghìn).
  document.querySelectorAll('.inp-money').forEach(i=>i.addEventListener('input',()=>{
    const p=SEED.products[+i.dataset.idx];
    const raw=i.value.replace(/\D/g,'');
    p.price = +raw;
    i.value = raw ? fmtN(+raw) : '';
    const tr=i.closest('tr');
    const ac=tr.querySelector('.cell-amount'); if(ac) ac.textContent=fmtN(amountOf(p));
    renderTotals();
  }));
}
/* ===== TAB 3: MẪU IN — bản xem trước hợp đồng, tự dựng lại từ dữ liệu đang nhập mỗi lần mở tab ===== */
function pv(id){ return document.getElementById(id)?.value?.trim() || ''; }
function vnDate(iso){ if(!iso) return '…../…../……..'; const [y,m,d]=iso.split('-'); return `ngày ${d} tháng ${m} năm ${y}`; }
function printParty(role, title, name, prefix, data){
  // data != null → lấy trực tiếp từ object (Bên Mua = công ty đã chọn, không còn ô input); ngược lại đọc từ input theo prefix.
  const g = k => data ? (data[k]||'') : pv(prefix+'-'+k);
  const rows = [
    ['Địa chỉ', g('address')], ['Mã số thuế', g('tax')], ['Điện thoại', g('phone')],
    ['Số tài khoản', [g('bankNo'), g('bankName')].filter(Boolean).join(' tại ')],
    ['Đại diện', [g('rep'), g('title') && 'Chức vụ: '+g('title')].filter(Boolean).join(' — ')],
  ].filter(([,v])=>v);
  return `<div class="party"><b>${role}: <span class="pname">${name||'………………………………………'}</span></b> (${title})<br>
    ${rows.map(([k,v])=>`&ensp;- ${k}: ${v}`).join('<br>')}</div>`;
}
function printGoodsTable(){
  const tm = STATE.contractType==='thuong_mai';
  const head = `<tr><th style="width:32px">STT</th><th>Mã hàng</th><th>Tên hàng hóa</th><th>Quy cách</th><th>ĐVT</th><th>Hãng, nước SX</th>
    ${tm?'<th>SL mua</th>':''}<th>Đơn giá có VAT (VNĐ)</th>${tm?'<th>Thành tiền (VNĐ)</th><th>Ghi chú</th>':''}</tr>`;
  let total=0;
  const rows = SEED.products.map((p,i)=>{
    total += amountOf(p);
    return `<tr><td class="num">${i+1}</td><td>${p.code||''}</td><td>${p.name||''}${p.tradeName&&p.tradeName!=='—'?' ('+p.tradeName+')':''}</td>
      <td>${p.spec||''}</td><td style="text-align:center">${p.unit||''}</td><td>${p.maker||''}</td>
      ${tm?`<td class="num">${fmtN(orderQtyOf(p))}</td>`:''}<td class="num">${fmtN(p.price)}</td>
      ${tm?`<td class="num">${fmtN(amountOf(p))}</td><td>${p.note||''}</td>`:''}</tr>`;
  }).join('');
  const colspan = tm ? 8 : 6;
  const foot = tm ? `<tr><td colspan="${colspan}" style="text-align:right"><b>Tổng cộng (đã gồm VAT)</b></td><td class="num"><b>${fmtN(total)}</b></td><td></td></tr>` : '';
  return { html:`<table>${head}${rows}${foot}</table>`, total };
}
function renderPrint(){
  const tm = STATE.contractType==='thuong_mai';
  const compName = document.getElementById('sel-company')?.selectedOptions[0]?.textContent, comp = compName==='— Chọn —'?'':compName;
  const supName = document.getElementById('sel-supplier')?.selectedOptions[0]?.textContent, sup = supName==='— Chọn —'?'':supName;
  const goods = printGoodsTable();
  document.getElementById('tab-print').innerHTML = `
    <div class="print-toolbar">
      <span class="text-muted small"><i class="mdi mdi-information-outline"></i> Mẫu in dựng tự động từ dữ liệu ở 2 tab — mở lại tab này là cập nhật theo nội dung mới nhất.</span>
      <button class="btn btn-sm btn-primary" id="btn-print"><i class="mdi mdi-printer"></i> In mẫu</button>
    </div>
    <div class="print-sheet" id="print-sheet">
      <div class="quochieu"><div class="l1">Cộng hòa xã hội chủ nghĩa Việt Nam</div><div class="l2">Độc lập - Tự do - Hạnh phúc</div></div>
      <h1>${pv('f-name')||('Hợp đồng '+(tm?'mua bán':'nguyên tắc mua bán')+' hàng hóa')}</h1>
      <div class="contract-no">Số: <b>${pv('f-number')||'…………/HĐ'}</b></div>
      <p><i>- Căn cứ Bộ luật Dân sự số 91/2015/QH13 và Luật Thương mại số 36/2005/QH11;<br>
      - Căn cứ nhu cầu và khả năng cung ứng của hai Bên.</i></p>
      <p>Hôm nay, ${vnDate(pv('f-sign'))}, chúng tôi gồm:</p>
      ${printParty('BÊN MUA', 'Bên A', comp, 'ben-a', STATE.buyerCompany)}
      ${printParty('BÊN BÁN', 'Bên B', sup, 'ben-b')}
      <p>Hai Bên thống nhất ký kết Hợp đồng với các điều khoản sau:</p>
      ${SEED.dieuKhoanHTML}
      <p style="margin-top:8px">Hợp đồng có hiệu lực từ ngày ký đến hết ${vnDate(pv('f-end')).replace('ngày','ngày')}.</p>
      <h5 style="text-align:center; margin-top:16px">DANH MỤC HÀNG HÓA ${tm?'':'VÀ ĐƠN GIÁ '}KÈM THEO HỢP ĐỒNG</h5>
      ${goods.html}
      ${tm?`<p><i>Bằng chữ: ${docSo(goods.total)}</i></p>`:`<p><i>Đơn giá đã bao gồm thuế VAT. Số lượng mua theo từng đơn đặt hàng của Bên Mua.</i></p>`}
      <div class="sign-row">
        <div class="sig"><div class="role">Đại diện Bên A</div><div class="hint">(Ký, ghi rõ họ tên, đóng dấu)</div><div class="who">${STATE.buyerCompany?.rep||''}</div></div>
        <div class="sig"><div class="role">Đại diện Bên B</div><div class="hint">(Ký, ghi rõ họ tên, đóng dấu)</div><div class="who">${pv('ben-b-rep')||''}</div></div>
      </div>
    </div>`;
  document.getElementById('btn-print').addEventListener('click', ()=>window.print());
}

/* ===== FOOTER: LƯU / LƯU VÀ GỬI ===== */
function validateRequired(){
  const missing = [];
  [['sel-company','Bên mua - Công ty thực hiện'],['sel-supplier','Nhà cung cấp'],['f-number','Số hợp đồng'],['f-name','Tên hợp đồng']]
    .forEach(([id,lbl])=>{ const el=document.getElementById(id); if(el && !el.value.trim()) missing.push(lbl); });
  if(!SEED.products.length) missing.push('Hàng hóa (ít nhất 1 dòng)');
  return missing;
}
function doSave(send){
  const miss = validateRequired();
  if(miss.length){ alert('Vui lòng nhập: '+miss.join(', ')); return; }
  const loai = STATE.contractType==='thuong_mai'?'Thương mại':'Nguyên tắc';
  alert(`Đã ${send?'lưu và gửi':'lưu'} hợp đồng mua (loại ${loai}) gồm ${SEED.products.length} hàng hóa.\n(Demo — chưa ghi dữ liệu thật.)`);
}
function bindFooter(){
  document.getElementById('btn-cancel').addEventListener('click', ()=>{ if(confirm('Hủy và rời form?')) location.reload(); });
  document.getElementById('btn-save').addEventListener('click', ()=>doSave(false));
  document.getElementById('btn-save-send').addEventListener('click', ()=>doSave(true));
}

/* ===== KHỞI TẠO ===== */
function initGeneral(){
  renderGeneral();
  document.getElementById('sel-type').addEventListener('change', e=>onContractTypeChange(e.target.value));
  document.getElementById('sel-company').addEventListener('change', e=>{ STATE.buyerCompany = SEED.companies.find(c=>c.id===e.target.value)||null; });
  document.getElementById('sel-supplier').addEventListener('change', e=>fillParty('ben-b', SEED.suppliers.find(c=>c.id===e.target.value)));
  document.getElementById('sel-company').value='TA'; STATE.buyerCompany = SEED.companies[0];
  document.getElementById('sel-supplier').value='HA'; fillParty('ben-b', SEED.suppliers[0]);
  ['f-sign','f-end'].forEach(id=>document.getElementById(id).addEventListener('change', computeDuration));
  computeDuration();
  renderProducts();
  bindFooter();
  document.getElementById('sel-type').value = 'thuong_mai';
  onContractTypeChange('thuong_mai');
  renderPrint();
  // Mỗi lần mở tab Mẫu in → dựng lại theo dữ liệu mới nhất ở 2 tab kia.
  $('a[href="#tab-print"]').on('shown.bs.tab', renderPrint);
}
document.addEventListener('DOMContentLoaded', initGeneral);
</script>
